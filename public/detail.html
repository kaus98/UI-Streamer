<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Streamer • Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="detail-page">
    <header class="topbar">
      <div class="brand">UI<span>Streamer</span></div>
      <a class="ghost icon-only" href="/" aria-label="Back to library">
        <span class="icon-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" role="presentation"><path d="M15 18l-6-6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </a>
    </header>

    <main class="detail-layout">
      <section class="detail-metadata">
        <div class="detail-poster" id="detailPoster"></div>
        <div class="detail-info">
          <p class="eyebrow" id="detailType"></p>
          <h1 id="detailTitle"></h1>
          <p class="meta" id="detailSubtitle"></p>
          <div class="detail-actions">
            <button id="pagePlay" class="icon-only" aria-label="Play" type="button">
              <span class="icon-mark" aria-hidden="true"><svg viewBox="0 0 24 24" role="presentation"><path d="M8 5l11 7-11 7z" fill="currentColor"/></svg></span>
            </button>
            <button id="pageRefresh" class="ghost icon-only" aria-label="Update IMDb" type="button">
              <span class="icon-mark" aria-hidden="true"><svg viewBox="0 0 24 24" role="presentation"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v6h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            </button>
          </div>
          <p class="helper" id="detailPlot"></p>
        </div>
      </section>

      <div class="player-wrap">
        <div class="video-surface" id="videoSurface">
          <video
            id="videoPlayer"
            controls={false}
            playsInline
            crossOrigin="anonymous"
            preload="metadata"
          ></video>
          <div class="controls-panel" id="controlsPanel">
            <div class="controls-top">
              <div class="video-focus">
                <h2 id="videoTitle"></h2>
                <p id="videoMeta" class="focus-meta"></p>
              </div>
            </div>
            <div class="controls-bottom">
              <div class="progress-row">
                <span class="time-display" id="currentTime">0:00</span>
                <input type="range" class="progress-slider" id="progressSlider" min="0" max="100" value="0" step="0.1">
                <span class="time-display" id="duration">0:00</span>
              </div>
              <div class="controls-row">
                <div class="controls-left">
                  <button class="play-pause-btn icon-only" id="playPauseBtn" aria-label="Play/Pause">
                    <span class="icon-mark" aria-hidden="true">
                      <svg viewBox="0 0 24 24" role="presentation"><path d="M8 5l11 7-11 7z" fill="currentColor"/></svg>
                    </span>
                  </button>
                  <div class="volume-group">
                    <button class="volume-btn icon-only" id="volumeBtn" aria-label="Volume">
                      <span class="icon-mark" aria-hidden="true">
                        <svg viewBox="0 0 24 24" role="presentation"><path d="M3 9v6h4l5 5V4L7 9z" fill="currentColor"/><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63z" fill="currentColor"/><path d="M19 12c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 15.14 21 13.62 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71z" fill="currentColor"/></svg>
                      </span>
                    </button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" value="1" step="0.1">
                  </div>
                </div>
                <div class="controls-right">
                  <span class="quality-chip" id="qualityChip">HD</span>
                  <button class="icon-only" id="fullscreenBtn" aria-label="Fullscreen">
                    <span class="icon-mark" aria-hidden="true">
                      <svg viewBox="0 0 24 24" role="presentation"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" fill="currentColor"/></svg>
                    </span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <section class="detail-meta-grid">
        <article>
          <h3>Genres</h3>
          <p id="detailGenres"></p>
        </article>
        <article>
          <h3>Cast</h3>
          <p id="detailCast"></p>
        </article>
        <article>
          <h3>IMDb Rating</h3>
          <p id="detailRating"></p>
        </article>
        <article>
          <h3>Runtime</h3>
          <p id="detailRuntime"></p>
        </article>
      </section>
    </main>

    <script type="module" src="/vidstack-player.js"></script>
    <script src="/detail.js"></script>
  </body>
</html>
