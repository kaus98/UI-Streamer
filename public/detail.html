<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UI Streamer • Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="detail-page">
    <header class="topbar">
      <div class="brand">UI<span>Streamer</span></div>
      <a class="ghost" href="/">Back to library</a>
    </header>

    <main class="detail-layout">
      <section class="detail-metadata">
        <div class="detail-poster" id="detailPoster"></div>
        <div class="detail-info">
          <p class="eyebrow" id="detailType"></p>
          <h1 id="detailTitle"></h1>
          <p class="meta" id="detailSubtitle"></p>
          <div class="detail-actions">
            <button id="pagePlay">Play</button>
            <button id="pageRefresh" class="ghost">Update IMDb</button>
          </div>
          <p class="helper" id="detailPlot"></p>
        </div>
      </section>

      <section class="detail-player">
        <div class="video-surface">
          <video id="detailVideo" preload="metadata"></video>
          <div class="video-focus" aria-hidden="true">
            <p class="focus-title" id="focusTitle"></p>
            <p class="focus-meta" id="focusMeta"></p>
          </div>
        </div>
        <div class="controls-panel">
          <div class="progress-row">
            <span id="currentTime">0:00</span>
            <input id="progressBar" type="range" min="0" max="100" value="0" step="0.1" />
            <span id="duration">0:00</span>
          </div>
          <div class="action-row">
            <button id="playerPlay" class="primary">Play</button>
            <button id="playerPause" class="ghost">Pause</button>
            <button id="detailRewind" class="ghost">-10s</button>
            <button id="detailForward" class="ghost">+10s</button>
            <div class="volume-group">
              <label for="volumeBar">Volume</label>
              <input id="volumeBar" type="range" min="0" max="1" step="0.05" value="1" />
            </div>
            <button id="playerFullscreen" class="ghost">Fullscreen</button>
            <div class="quality-chip" id="qualityChip">Auto</div>
          </div>
        </div>
      </section>

      <section class="detail-meta-grid">
        <article>
          <h3>Genres</h3>
          <p id="detailGenres"></p>
        </article>
        <article>
          <h3>Cast</h3>
          <p id="detailCast"></p>
        </article>
        <article>
          <h3>IMDb Rating</h3>
          <p id="detailRating"></p>
        </article>
        <article>
          <h3>Runtime</h3>
          <p id="detailRuntime"></p>
        </article>
      </section>
    </main>

    <script src="/detail.js"></script>
  </body>
</html>
